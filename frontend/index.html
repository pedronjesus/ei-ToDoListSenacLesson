<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap"S -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class= "container">

        <!-- ===============================
        HEADER (PRONTO)
        =============================== -->
        <header class="header">
            <h1 class="header__title">Todo list</h1>
            <p class="header__subtitle">
                Organize suas tarefas de forma moderna e eficiente
            </p>
        </header>

        <!-- ===============================
        CARDS / STATS
        =============================== -->
        <section class="stats">

            <div class="stat-card">
                <h2 class="stat-card__number">0</h2>
                <p class="stat-card__label">Total</p>
            </div>

            <div class="stat-card">
                <h2 class="stat-card__number">0</h2>
                <p class="stat-card__label">Ativas</p>
            </div>

            <div class="stat-card">
                <h2 class="stat-card__number">0</h2>
                <p class="stat-card__label">Completas</p>
            </div>

        </section>

        <!-- ===============================
        ADD TASK
        =============================== -->
        <section class="add-task">

            <form class="add-task__form">

                <input
                    class="input"
                    type="text"
                    placeholder="Digite uma nova tarefa"
                >

                <button
                    class="btn btn--primary"
                    type="submit"
                >
                    + Adicionar
                </button>

            </form>

        </section>

        <!-- ===============================
        FILTROS
        =============================== -->
        <nav class="filters">

            <button class="btn btn--filter is-active">
                Todas
            </button>

            <button class="btn btn--filter">
                Ativas
            </button>

            <button class="btn btn--filter">
                Completas
            </button>

        </nav>

        <!-- ===============================
        LISTA DE TAREFAS
        =============================== -->
        <section class="task-list">

            <ul class="task-list__ul">

                <li class="task-item">
                    Tarefa 1
                </li>

                <li class="task-item">
                    Tarefa 2
                </li>

            </ul>

        </section>

    </main>

    <script>script.js</script>

</body>

</html>
