<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <title>Todo List</title>
</head>

<body>




    <main>
         <!-- ===============================
         HEADER (PRONTO)
         =============================== -->
        <header>
            <h1>Todo list</h1>
            <p>Organize suas tarefas de forma moderna e eficiente</p>
        </header>

         <!-- ===============================
         DESAFIO 1 (HTML)
         Aluno: deve montar os cards
         =============================== -->
        <section>
            <div>
                <h2>0</h2>
                <p>Total</p>
            </div>

            <div>
                <h2>0</h2>
                <p>Ativas</p>
            </div>

            <div>
                <h2>0</h2>
                <p>Completas</p>
            </div>
        </section>

        
         <!-- ===============================
         ADD TASK (PRONTO)
         =============================== -->
        <section>
            <form>
                <input type="text" placeholder="Digite uma nova tarefa">
                <button type="submit">+ Adicionar</button>
            </form>
        </section>

         <!-- ===============================
         FILTROS (PARCIAL)
         Aluno: pode estilizar e melhorar
         =============================== -->
        <nav>
            <button>Todas</button>
            <button>Ativas</button>
            <button>Completas</button>
        </nav>

         <!-- ===============================
         LISTA (PRONTA E VAZIA)
         =============================== -->
        <section>
            <ul>
                <li>Tarefa 1</li>
                <li>Tarefa 2</li>
            </ul>
        </section>
    </main>



    <script src="script.js"></script>


</body>

</html>
